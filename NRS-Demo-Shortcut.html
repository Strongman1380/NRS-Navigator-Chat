<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRS Resource Navigation - Install Shortcut</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #f0f9ff;
  }
  .card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 30px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .icon {
    width: 80px;
    height: 80px;
    background: rgba(96,165,250,0.3);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 40px;
  }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { opacity: 0.8; margin-bottom: 32px; font-size: 15px; }
  .steps {
    text-align: left;
    margin-bottom: 32px;
  }
  .step {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: flex-start;
  }
  .step-num {
    background: #60a5fa;
    color: #1e3a5f;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  .step-text { font-size: 15px; line-height: 1.4; padding-top: 3px; }
  .share-icon { display: inline-block; width: 20px; height: 20px; vertical-align: middle; }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #60a5fa;
    color: #1e3a5f;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:active { opacity: 0.8; }
  .note {
    margin-top: 16px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🧭</div>
  <h1>NRS Resource Navigation</h1>
  <p class="subtitle">Add this app to your Home Screen for a native app experience</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Tap the <strong>Share</strong> button <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> at the bottom of Safari</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Scroll down and tap <strong>"Add to Home Screen"</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Tap <strong>"Add"</strong> in the top right corner</div>
    </div>
  </div>

  <a class="btn" href="http://192.168.254.177:5174/" id="openApp">Open App Now</a>
  <p class="note">Make sure your iPhone is on the same Wi-Fi network as your computer</p>
</div>

<script>
  // Auto-redirect if already in standalone mode
  if (window.navigator.standalone) {
    window.location.href = 'http://192.168.254.177:5174/';
  }
</script>
</body>
</html>
